<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Copa Barrial Admin</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">

            🏆 Copa Barrial

        </div>

<nav>

    <button
        class="menu-item active"
        data-view="dashboard"
        onclick="navigate('dashboard')">

        📊 Dashboard

    </button>

    <button
        class="menu-item"
        data-view="tournaments"
        onclick="navigate('tournaments')">

        🏆 Torneos

    </button>

    <button
        class="menu-item"
        data-view="teams"
        onclick="navigate('teams')">

        👥 Equipos

    </button>

</nav>

    </aside>

<main class="content">

    <header class="topbar">

        <h1>Panel de Administración</h1>

        <button id="logoutButton" class="logout">
            Cerrar sesión
        </button>

    </header>

    <div id="view"></div>

</main>

</div>

<div id="modalOverlay" class="modal-overlay hidden">

    <div class="modal">

        <div class="modal-header">

            <h2 id="modalTitle">Nuevo Torneo</h2>

            <button onclick="closeModal()">
                ✕
            </button>

        </div>

        <div id="modalBody"></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/teams.js"></script>
<script src="js/tournaments.js"></script>
<script src="js/app.js"></script>
<script src="js/fixture.js"></script>
<script src="js/matches.js"></script>
<script src="js/components/teamCard.js"></script>

</body>
</html>
